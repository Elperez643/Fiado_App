name: Fiado App CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    name: Flutter Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.201'

      - name: Restore backend
        run: dotnet restore backend/FiadoApp.Backend.sln

      - name: Build backend
        run: dotnet build backend/FiadoApp.Backend.sln --no-restore --configuration Release

      - name: Test backend
        run: dotnet test backend/FiadoApp.Backend.sln --no-build --configuration Release
